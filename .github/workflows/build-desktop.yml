name: Build Desktop Apps

on:
  pull_request:
    paths:
      - "videocaptioner/**"
      - "resource/**"
      - "scripts/build_desktop.py"
      - "scripts/smoke_desktop.py"
      - "VideoCaptioner.spec"
      - "pyproject.toml"
      - "uv.lock"
      - ".github/workflows/build-desktop.yml"
  push:
    branches:
      - master
      - main
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 45
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
          - name: macOS Intel
            os: macos-15-intel

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: astral-sh/setup-uv@v8.1.0
        with:
          version: "latest"

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --frozen

      - name: Install Inno Setup (Windows only)
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install innosetup --no-progress --confirm

      - name: Build desktop bundle
        run: uv run --with pyinstaller --with static-ffmpeg python scripts/build_desktop.py --clean${{ runner.os == 'Windows' && ' --installer' || '' }}

      - name: Smoke test packaged app
        run: uv run python scripts/smoke_desktop.py dist/VideoCaptioner

      - name: Upload desktop artifact
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ runner.os }}
          path: |
            artifacts/*.zip
            artifacts/*.exe
          if-no-files-found: warn
          retention-days: 14

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          gh release view "$TAG" >/dev/null 2>&1 || \
            gh release create "$TAG" --title "$TAG" --generate-notes
          gh release upload "$TAG" artifacts/*.zip artifacts/*.exe --clobber
